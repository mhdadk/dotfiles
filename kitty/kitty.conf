# Font
font_family      Liga SFMono Nerd Font
bold_font        Liga SFMono Nerd Font Bold
italic_font      Liga SFMono Nerd Font Italic
bold_italic_font Liga SFMono Nerd Font Bold Italic
font_size        12.0

# Ligatures (this font has them; disable only under the cursor)
disable_ligatures cursor

# Font-size zoom keys
map ctrl+shift+equal  change_font_size all +1.0
map ctrl+shift+minus  change_font_size all -1.0
map ctrl+shift+0      change_font_size all 0

# Allow Neovim (or anything) to drive the terminal, e.g. `kitty @ set-font-size`
allow_remote_control yes

# Sensible defaults
scrollback_lines        10000
enable_audio_bell       no
cursor_blink_interval   0
window_padding_width    0
confirm_os_window_close 0


# BEGIN_KITTY_THEME
# Dracula
include current-theme.conf
# END_KITTY_THEME